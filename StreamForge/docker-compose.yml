version: '3.9'

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: streamforge-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: streamforge

  # ── Redis (future: BullMQ job queue) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: streamforge-redis
    ports:
      - '6379:6379'

  # ── Backend (Express API) ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: development
    container_name: streamforge-backend
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app          # hot reload in dev
      - /app/node_modules       # prevent host node_modules from overriding
    depends_on:
      - mongodb
      - redis

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: deps             # use deps stage for dev (full node_modules)
    container_name: streamforge-frontend
    ports:
      - '3000:3000'
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev

volumes:
  mongo_data:
